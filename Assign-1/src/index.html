<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ScalerChat — Talk to Scaler Founders & Instructors</title>
  <meta name="description" content="Have real conversations with Scaler personalities — Anshuman Singh, Abhimanyu Saxena, and Kshitij Mishra. AI-powered persona chatbot." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div id="app">
    <!-- ── HEADER ── -->
    <header id="app-header">
      <div class="header-brand">
        <div class="logo-icon">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
          </svg>
        </div>
        <h1>ScalerChat</h1>
      </div>
      <p class="header-subtitle">Talk to Scaler personalities, powered by AI</p>
    </header>

    <!-- ── PERSONA TABS ── -->
    <nav id="persona-tabs" role="tablist" aria-label="Select persona">
      <button class="persona-tab active" data-persona="anshuman" role="tab" aria-selected="true" id="tab-anshuman">
        <span class="tab-avatar">AS</span>
        <span class="tab-name">Anshuman Singh</span>
      </button>
      <button class="persona-tab" data-persona="abhimanyu" role="tab" aria-selected="false" id="tab-abhimanyu">
        <span class="tab-avatar">AX</span>
        <span class="tab-name">Abhimanyu Saxena</span>
      </button>
      <button class="persona-tab" data-persona="kshitij" role="tab" aria-selected="false" id="tab-kshitij">
        <span class="tab-avatar">KM</span>
        <span class="tab-name">Kshitij Mishra</span>
      </button>
    </nav>

    <!-- ── ACTIVE PERSONA BANNER ── -->
    <div id="active-persona-banner">
      <div class="persona-info">
        <div class="persona-avatar-large" id="banner-avatar">AS</div>
        <div>
          <h2 id="banner-name">Anshuman Singh</h2>
          <p id="banner-title">Co-founder, Scaler & InterviewBit</p>
        </div>
      </div>
    </div>

    <!-- ── CHAT AREA ── -->
    <main id="chat-area">
      <div id="messages-container">
        <!-- Welcome message injected by JS -->
      </div>

      <!-- ── TYPING INDICATOR ── -->
      <div id="typing-indicator" class="hidden">
        <div class="typing-bubble">
          <div class="typing-avatar" id="typing-avatar">AS</div>
          <div class="typing-dots">
            <span></span><span></span><span></span>
          </div>
        </div>
      </div>

      <!-- ── SUGGESTION CHIPS ── -->
      <div id="suggestion-chips">
        <!-- Chips injected by JS -->
      </div>
    </main>

    <!-- ── INPUT AREA ── -->
    <footer id="input-area">
      <div class="input-wrapper">
        <textarea
          id="user-input"
          placeholder="Type your message…"
          rows="1"
          aria-label="Type your message"
        ></textarea>
        <button id="send-btn" aria-label="Send message" disabled>
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"></line>
            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
          </svg>
        </button>
      </div>
    </footer>
  </div>

  <script type="module" src="./main.js"></script>
</body>
</html>
