<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ScalerChat — Talk to Scaler Founders & Instructors</title>
  <meta name="description" content="Have real conversations with Scaler personalities — Anshuman Singh, Abhimanyu Saxena, and Kshitij Mishra. AI-powered persona chatbot." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <!-- ── ANIMATED MESH BACKGROUND ── -->
  <div id="mesh-bg" aria-hidden="true">
    <div class="mesh-blob mesh-blob-1"></div>
    <div class="mesh-blob mesh-blob-2"></div>
    <div class="mesh-blob mesh-blob-3"></div>
  </div>

  <div id="app">
    <!-- ── HEADER ── -->
    <header id="app-header">
      <div class="header-row">
        <div class="header-brand">
          <div class="logo-icon">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
            </svg>
          </div>
          <h1>ScalerChat</h1>
        </div>
        <button id="new-chat-btn" aria-label="Start new conversation" title="New conversation">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 20h9"></path>
            <path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"></path>
          </svg>
        </button>
      </div>
    </header>

    <!-- ── PERSONA SELECTOR CARDS ── -->
    <nav id="persona-selector" role="tablist" aria-label="Select persona">
      <button class="persona-card active" data-persona="anshuman" role="tab" aria-selected="true" id="tab-anshuman">
        <div class="card-accent"></div>
        <div class="card-body">
          <div class="card-avatar">
            <span class="avatar-initials">AS</span>
            <span class="online-dot"></span>
          </div>
          <div class="card-info">
            <span class="card-name">Anshuman Singh</span>
            <span class="card-tagline">Ex-Facebook · ICPC Finalist</span>
          </div>
        </div>
      </button>
      <button class="persona-card" data-persona="abhimanyu" role="tab" aria-selected="false" id="tab-abhimanyu">
        <div class="card-accent"></div>
        <div class="card-body">
          <div class="card-avatar">
            <span class="avatar-initials">AX</span>
          </div>
          <div class="card-info">
            <span class="card-name">Abhimanyu Saxena</span>
            <span class="card-tagline">TEDx · First Principles</span>
          </div>
        </div>
      </button>
      <button class="persona-card" data-persona="kshitij" role="tab" aria-selected="false" id="tab-kshitij">
        <div class="card-accent"></div>
        <div class="card-body">
          <div class="card-avatar">
            <span class="avatar-initials">KM</span>
          </div>
          <div class="card-info">
            <span class="card-name">Kshitij Mishra</span>
            <span class="card-tagline">DSA Guru · Instructor</span>
          </div>
        </div>
      </button>
    </nav>

    <!-- ── CHAT AREA ── -->
    <main id="chat-area">
      <div id="chat-content" class="visible">
        <div id="messages-container">
          <!-- Welcome hero + messages injected by JS -->
        </div>

        <!-- ── TYPING INDICATOR ── -->
        <div id="typing-indicator" class="hidden">
          <div class="typing-bubble">
            <div class="typing-avatar" id="typing-avatar">AS</div>
            <div class="typing-dots">
              <span></span><span></span><span></span>
            </div>
          </div>
        </div>

        <!-- ── SUGGESTION CHIPS ── -->
        <div id="suggestion-chips">
          <!-- Chips injected by JS -->
        </div>
      </div>
    </main>

    <!-- ── INPUT AREA ── -->
    <footer id="input-area">
      <div class="input-wrapper">
        <textarea
          id="user-input"
          placeholder="Type your message…"
          rows="1"
          aria-label="Type your message"
        ></textarea>
        <button id="send-btn" aria-label="Send message" disabled>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"></line>
            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
          </svg>
        </button>
      </div>
    </footer>
  </div>

  <script type="module" src="./main.js"></script>
</body>
</html>
